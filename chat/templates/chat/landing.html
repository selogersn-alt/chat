<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub de Connexion - Loger Immobilier</title>
    
    {% load static %}
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.png' %}?v=2">
    
    <!-- Open Graph / Meta tags pour WhatsApp et les réseaux sociaux -->
    <meta property="og:title" content="Terminal Hub - Loger Immobilier">
    <meta property="og:description" content="Système de gestion de la clientèle de Loger Immobilier Group">
    <meta property="og:image" content="https://logersenegal.com/static/favicon.png">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        forest: {
                            50: '#f2f7f4',
                            100: '#e1efe5',
                            500: '#2d6a4f',
                            600: '#1b4332',
                            700: '#081c15',
                            900: '#040d0a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f2f7f4; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-forest-50 relative overflow-hidden">

    <!-- Background decorative elements -->
    <div class="absolute top-0 left-0 w-full h-96 bg-forest-900 rounded-b-[4rem] md:rounded-b-[8rem] shadow-2xl z-0 transform -translate-y-10"></div>
    <div class="absolute top-20 right-10 w-64 h-64 bg-forest-600/20 rounded-full blur-3xl z-0"></div>
    <div class="absolute top-40 left-10 w-48 h-48 bg-forest-500/20 rounded-full blur-2xl z-0"></div>

    <div class="max-w-2xl w-full bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden z-10 border border-white/50 p-8 md:p-12 text-center animate-fade-in">
        
        <div class="mb-10">
            <div class="w-20 h-20 bg-forest-100 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner rotate-3">
                <svg class="w-10 h-10 text-forest-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-forest-900 tracking-tight mb-3">Système de Gestion de la Clientèle</h1>
            <p class="text-forest-600/80 font-medium text-lg max-w-lg mx-auto">
                Loger Immobilier Group
            </p>
            <div class="mt-4 inline-block px-4 py-1.5 bg-forest-100/80 text-forest-700 text-xs font-bold uppercase tracking-widest rounded-full border border-forest-200">
                Terminal Hub Global
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
            
            <!-- Senegal (Active) -->
            <a href="{% url 'login' %}" class="group relative bg-white p-6 rounded-2xl border-2 border-forest-100 hover:border-forest-500 shadow-sm hover:shadow-xl hover:shadow-forest-500/10 transition-all duration-300 animate-slide-up delay-100 transform hover:-translate-y-1 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-forest-50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative flex items-center justify-between z-10">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl filter drop-shadow-md">🇸🇳</div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-800">Sénégal</h3>
                            <p class="text-sm text-forest-600 font-medium mt-1">Accéder au terminal</p>
                        </div>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-forest-50 group-hover:bg-forest-600 flex items-center justify-center transition-colors">
                        <svg class="w-5 h-5 text-forest-600 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </div>
            </a>

            <!-- Côte d'Ivoire (Coming Soon) -->
            <div class="relative bg-gray-50 p-6 rounded-2xl border-2 border-gray-100 animate-slide-up delay-200 opacity-80 cursor-not-allowed">
                <div class="relative flex items-center justify-between z-10">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl filter drop-shadow-sm grayscale">🇨🇮</div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-500">Côte d'Ivoire</h3>
                            <p class="text-xs text-amber-600 font-bold uppercase tracking-wider mt-1 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                Bientôt
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bénin (Coming Soon) -->
            <div class="relative bg-gray-50 p-6 rounded-2xl border-2 border-gray-100 animate-slide-up delay-300 opacity-80 cursor-not-allowed">
                <div class="relative flex items-center justify-between z-10">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl filter drop-shadow-sm grayscale">🇧🇯</div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-500">Bénin</h3>
                            <p class="text-xs text-amber-600 font-bold uppercase tracking-wider mt-1 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                Bientôt
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Togo (Coming Soon) -->
            <div class="relative bg-gray-50 p-6 rounded-2xl border-2 border-gray-100 animate-slide-up delay-400 opacity-80 cursor-not-allowed">
                <div class="relative flex items-center justify-between z-10">
                    <div class="flex items-center gap-4">
                        <div class="text-4xl filter drop-shadow-sm grayscale">🇹🇬</div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-500">Togo</h3>
                            <p class="text-xs text-amber-600 font-bold uppercase tracking-wider mt-1 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                Bientôt
                            </p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-10 pt-6 border-t border-gray-100 text-sm text-gray-400 font-medium">
            &copy; 2024 Loger Immobilier Group. Tous droits réservés.
        </div>

    </div>

</body>
</html>
