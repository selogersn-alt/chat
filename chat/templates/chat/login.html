<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Loger Sénégal Chat</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        forest: {
                            50: '#f2f8f5',
                            100: '#e1efe7',
                            500: '#1b6b3e',
                            600: '#0f4f2c',
                            700: '#0b3c21',
                            900: '#052212',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body {
            background: linear-gradient(135deg, #052212 0%, #0f4f2c 50%, #1b6b3e 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass rounded-3xl shadow-2xl p-8 transition-all duration-300 hover:shadow-forest-900/30">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-forest-600 text-white mb-4 shadow-lg shadow-forest-900/40">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 18.09a8.967 8.967 0 01-.334-3.472C3.393 13.434 2.25 11.233 2.25 9c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-forest-900">Loger Sénégal</h1>
            <p class="text-sm text-forest-600 mt-1">Console Agent & Webhook Manager</p>
        </div>

        <!-- Form -->
        <form method="POST" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="p-3 bg-red-100 border border-red-200 text-red-700 text-xs rounded-xl">
                Identifiants incorrects. Veuillez réessayer.
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-xs font-semibold uppercase tracking-wider text-forest-900 mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" required 
                    class="w-full px-4 py-3 rounded-xl border border-forest-100 focus:outline-none focus:ring-2 focus:ring-forest-500 bg-white/50 text-forest-900 placeholder-forest-500/50 text-sm transition-all"
                    placeholder="Entrez votre nom d'utilisateur">
            </div>

            <div>
                <label for="id_password" class="block text-xs font-semibold uppercase tracking-wider text-forest-900 mb-2">Mot de passe</label>
                <input type="password" name="password" id="id_password" required 
                    class="w-full px-4 py-3 rounded-xl border border-forest-100 focus:outline-none focus:ring-2 focus:ring-forest-500 bg-white/50 text-forest-900 placeholder-forest-500/50 text-sm transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-forest-600 hover:bg-forest-700 text-white font-semibold rounded-xl shadow-lg shadow-forest-900/20 hover:shadow-forest-900/30 transition-all text-sm duration-200">
                Se Connecter
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center" aria-hidden="true">
                <div class="w-full border-t border-forest-500/20"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-transparent px-2 text-forest-600 font-semibold tracking-wider">Mode Démo local</span>
            </div>
        </div>

        <!-- Auto Login Button -->
        <a href="?auto_login=true" 
            class="block w-full text-center py-3 border-2 border-forest-600 text-forest-600 hover:bg-forest-600 hover:text-white font-semibold rounded-xl transition-all text-sm duration-200">
            Connexion Automatique (Agent Démo)
        </a>
    </div>
</body>
</html>
